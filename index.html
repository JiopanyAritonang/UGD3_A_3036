<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unguided Manipulasi DOM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-card">
        
        <h2>Form Sign In</h2>
        <hr> <form id="loginForm">

        <label>Username</label>
        <input type="text" id="username" placeholder="Username">

        <label>Password</label>
        <input type="password" id="password" placeholder="Password">

        <p id="error-message"></p>

        <hr> <button type="submit" id="signInBtn">Sign In</button>
        </form>
    </div>

    <script>
        var loginForm = document.getElementById('loginForm');
        var errorMessage = document.getElementById('error-message');

        loginForm.addEventListener('submit', function(event) {
            event.preventDefault();

            var user = document.getElementById('username').value.trim();
            var pass = document.getElementById('password').value.trim();

            if (user === "" || pass === "") {
                errorMessage.textContent = "Username atau Password tidak boleh kosong.";
            } else {
                errorMessage.textContent = "";
                
                var targetUrl = "https://www.instagram.com/uajy?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==";
                
                window.open(targetUrl, '_blank');
            }
        });
    </script>
</body>
</html>
